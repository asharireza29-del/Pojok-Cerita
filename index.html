<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pojok Cerita - Toko Buku & Novel Digital</title>
    <style>
        /* --- RESET & FONTS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            padding-bottom: 60px;
        }

        /* --- HEADER & NAVIGASI --- */
        header {
            background: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 20px;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Sesuai Permintaan: Font Arial, Ukuran 14 (diubah ke rem/px setara untuk estetika modern namun tetap terbaca), Warna Menarik */
        .brand-title {
            font-family: 'Arial', sans-serif;
            font-size: 24px; /* Disesuaikan agar proposional sebagai logo/nama web utama */
            font-weight: bold;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: 2px solid transparent;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            color: #555;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: #ffeef0;
            color: #ff4e50;
        }

        .upload-trigger-btn {
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            color: white;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 78, 80, 0.3);
            transition: transform 0.2s;
        }

        .upload-trigger-btn:hover {
            transform: scale(1.05);
        }

        /* --- KATALOG PRODUK --- */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #222;
            border-left: 5px solid #ff4e50;
            padding-left: 10px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .cover-container {
            width: 100%;
            height: 280px;
            background-color: #eaeaea;
            overflow: hidden;
        }

        .product-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #222;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.05rem;
            color: #e63946;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .buy-btn {
            flex: 2;
            background-color: #2ec4b6;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #20a396;
        }

        .delete-btn {
            flex: 1;
            background-color: #f1faee;
            color: #e63946;
            border: 1px solid #e63946;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background-color: #e63946;
            color: white;
        }

        /* --- MODAL DIALOG (JENDELA UPLOAD) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-box h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #222;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #ff4e50;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: normal;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .submit-btn {
            flex: 2;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-btn {
            flex: 1;
            background: #eee;
            color: #333;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- HEADER UTAMA -->
    <header>
        <div class="header-container">
            <!-- Nama Website sesuai instruksi -->
            <div class="brand-title">Pojok Cerita</div>
            
            <!-- Navigasi Utama -->
            <nav>
                <button class="nav-btn active" onclick="filterCategory('all')">Semua Produk</button>
                <button class="nav-btn" onclick="filterCategory('buku')">Buku Digital</button>
                <button class="nav-btn" onclick="filterCategory('novel')">Novel Digital</button>
                <button class="upload-trigger-btn" onclick="toggleModal(true)">+ Upload Produk</button>
            </nav>
        </div>
    </header>

    <!-- KONTEN UTAMA / KATALOG -->
    <main>
        <h2 class="section-title" id="current-category-title">Semua Koleksi</h2>
        <div class="product-grid" id="product-container">
            <!-- Produk akan muncul di sini secara dinamis -->
        </div>
    </main>

    <!-- MODAL / JENDELA UPLOAD -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-box">
            <h3>Upload Produk Baru</h3>
            <form id="uploadForm" onsubmit="handleUpload(event)">
                
                <!-- Pilihan Tipe Kategori -->
                <div class="form-group">
                    <label>Kategori Produk</label>
                    <div class="radio-group">
                        <label><input type="radio" name="kategori" value="buku" checked> Buku Digital</label>
                        <label><input type="radio" name="kategori" value="novel"> Novel Digital</label>
                    </div>
                </div>

                <!-- Judul -->
                <div class="form-group">
                    <label for="judul">Judul Produk</label>
                    <input type="text" id="judul" placeholder="Masukkan judul buku/novel" required>
                </div>

                <!-- Harga -->
                <div class="form-group">
                    <label for="harga">Harga (Rp)</label>
                    <input type="number" id="harga" placeholder="Contoh: 50000" required>
                </div>

                <!-- Upload Cover -->
                <div class="form-group">
                    <label for="cover">Upload Foto Cover (File Gambar atau URL Gambar)</label>
                    <input type="text" id="coverUrl" placeholder="Masukkan URL Gambar Cover atau biarkan kosong untuk default">
                    <input type="file" id="coverFile" accept="image/*" style="margin-top: 8px;">
                </div>

                <!-- Link Lynk.id -->
                <div class="form-group">
                    <label for="lynkLink">Link Akun lynk.id Produk</label>
                    <input type="url" id="lynkLink" placeholder="https://lynk.id/username/produk" required>
                </div>

                <!-- Tombol Aksi -->
                <div class="modal-footer">
                    <button type="button" class="cancel-btn" onclick="toggleModal(false)">Batal</button>
                    <button type="submit" class="submit-btn">Upload ke Halaman Utama</button>
                </div>
            </form>
        </div>
    </div>

    <!-- LOGIKA APLIKASI (JAVASCRIPT) -->
    <script>
        // Data Dummy Awal agar website tidak kosong saat pertama dibuka
        let products = [
            {
                id: 1,
                kategori: 'novel',
                judul: 'Misteri Pojok Cerita',
                harga: 45000,
                cover: 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=500&auto=format&fit=crop&q=60',
                link: 'https://lynk.id/'
            },
            {
                id: 2,
                kategori: 'buku',
                judul: 'Panduan Jualan Digital Keren',
                harga: 75000,
                cover: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=500&auto=format&fit=crop&q=60',
                link: 'https://lynk.id/'
            }
        ];

        let currentFilter = 'all';

        // Fungsi Buka/Tutup Jendela Modal
        function toggleModal(show) {
            const modal = document.getElementById('uploadModal');
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
                document.getElementById('uploadForm').reset();
            }
        }

        // Fungsi Menampilkan Produk ke Halaman Utama
        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';

            const filtered = products.filter(p => currentFilter === 'all' || p.kategori === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">Belum ada produk di kategori ini. Silakan upload produk baru!</div>`;
                return;
            }

            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="cover-container">
                        <img src="${product.cover}" alt="${product.judul}" class="product-cover">
                    </div>
                    <div class="product-info">
                        <div>
                            <h4 class="product-name">${product.judul}</h4>
                            <p class="product-price">Rp ${Number(product.harga).toLocaleString('id-ID')}</p>
                        </div>
                        <div class="action-buttons">
                            <button class="delete-btn" onclick="deleteProduct(${product.id})">Hapus</button>
                            <a href="${product.link}" target="_blank" class="buy-btn">Beli</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Fungsi Filter Kategori Navigasi
        function filterCategory(category) {
            currentFilter = category;
            
            // Perbarui gaya tombol navigasi yang aktif
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const eventTarget = event ? event.target : null;
            if(eventTarget && eventTarget.classList.contains('nav-btn')) {
                eventTarget.classList.add('active');
            }

            // Perbarui Judul Section
            const titleMap = { 'all': 'Semua Koleksi', 'buku': 'Koleksi Buku Digital', 'novel': 'Koleksi Novel Digital' };
            document.getElementById('current-category-title').innerText = titleMap[category];

            renderProducts();
        }

        // Fungsi Menghapus Produk sesuai Permintaan
        function deleteProduct(id) {
            if (confirm("Apakah Anda yakin ingin menghapus produk ini dari halaman utama?")) {
                products = products.filter(p => p.id !== id);
                renderProducts();
            }
        }

        // Fungsi saat Form Upload di-Submit
        function handleUpload(event) {
            event.preventDefault();

            const kategori = document.querySelector('input[name="kategori"]:checked').value;
            const judul = document.getElementById('judul').value;
            const harga = document.getElementById('harga').value;
            const link = document.getElementById('lynkLink').value;
            
            let cover = 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=500&auto=format&fit=crop&q=60'; // default cover jika kosong
            
            const coverUrl = document.getElementById('coverUrl').value;
            const coverFile = document.getElementById('coverFile').files[0];

            // Jika user menggunakan upload file lokal
            if (coverFile) {
                cover = URL.createObjectURL(coverFile);
            } else if (coverUrl) {
                cover = coverUrl;
            }

            // Tambahkan objek produk baru ke dalam array list
            const newProduct = {
                id: Date.now(), // Unique ID menggunakan timestamp
                kategori: kategori,
                judul: judul,
                harga: harga,
                cover: cover,
                link: link
            };

            products.unshift(newProduct); // Taruh di paling atas halaman utama
            
            // Reset, tutup modal, dan segarkan halaman utama
            toggleModal(false);
            renderProducts();
        }

        // Load data bawaan saat halaman pertama kali dibuka
        window.onload = renderProducts;
    </script>
</body>
</html>
